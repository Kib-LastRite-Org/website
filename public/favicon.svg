<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#07190D"/>

  <!-- Candle body -->
  <rect x="35" y="40" width="30" height="40" rx="4" fill="#3EB489" opacity="0.9"/>

  <!-- Candle wick -->
  <line x1="50" y1="40" x2="50" y2="25" stroke="#FF6F00" stroke-width="2" stroke-linecap="round"/>

  <!-- Flame -->
  <path d="M 50 20 Q 45 10 50 5 Q 55 10 50 20 Z" fill="#FF6F00"/>
  <circle cx="50" cy="12" r="3" fill="#FFD700" opacity="0.8"/>

  <!-- Subtle glow effect -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#3EB489" stroke-width="0.5" opacity="0.3"/>
</svg>
