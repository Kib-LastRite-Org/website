<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Ascending Monument: geometric upward form suggesting legacy and transcendence -->

  <!-- Left ascending line -->
  <line x1="32" y1="85" x2="64" y2="30" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Right ascending line -->
  <line x1="96" y1="85" x2="64" y2="30" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Base horizontal line -->
  <line x1="32" y1="85" x2="96" y2="85" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Vertical centerline for balance -->
  <line x1="64" y1="30" x2="64" y2="102" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <style>
    svg {
      color: #000;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        color: #fff;
      }
    }
  </style>
</svg>